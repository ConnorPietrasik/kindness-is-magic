# A generic, single database configuration.

[alembic]
# path to migration scripts
# Use forward slashes (/) also on Windows
script_location = alembic

# template used to generate migration file names
# file_template = %%(year)d%%(month).2d%%(day).2d%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# timezone to use when rendering the date
# within the migration file name and the script
# timezone =

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when stamping
# script_location = alembic

# The URI your database will be accessible at
# Read from DATABASE_URL env var — set this in docker-compose.yml
sqlalchemy.url = postgresql://user:pass@host/db

# Truncate long configuration values to this number of characters
# when printing the configuration
# output_encoding = utf-8

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
